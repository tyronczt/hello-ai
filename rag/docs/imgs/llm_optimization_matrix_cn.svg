<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <!-- 手绘风格滤镜 -->
    <filter id="sketch" x="-5%" y="-5%" width="110%" height="110%">
      <feTurbulence type="turbulence" baseFrequency="0.02" numOctaves="3" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="1" xChannelSelector="R" yChannelSelector="G"/>
    </filter>

    <!-- 手绘线条效果 -->
    <filter id="handdrawn">
      <feTurbulence type="turbulence" baseFrequency="0.05" numOctaves="2" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="2"/>
    </filter>
  </defs>

  <!-- 背景 -->
  <rect x="0" y="0" width="800" height="600" fill="#f8f9fa" stroke="#333" stroke-width="2" rx="15"/>

  <!-- 标题框 -->
  <rect x="200" y="20" width="400" height="50" fill="#e8e8e8" stroke="#333" stroke-width="2" rx="10"/>
  <text x="400" y="52" font-family="Comic Sans MS, cursive, sans-serif" font-size="22" fill="#333" text-anchor="middle" font-weight="bold">提示词工程 vs RAG vs 微调</text>

  <!-- 主图表区域背景 -->
  <rect x="100" y="90" width="600" height="450" fill="#ffffff" stroke="#333" stroke-width="2" rx="5"/>

  <!-- Y轴标签 -->
  <text x="50" y="300" font-family="Comic Sans MS, cursive, sans-serif" font-size="14" fill="#333" text-anchor="middle" transform="rotate(-90 50 300)">上下文优化</text>

  <!-- X轴标签 -->
  <text x="400" y="570" font-family="Comic Sans MS, cursive, sans-serif" font-size="14" fill="#333" text-anchor="middle">大模型优化</text>

  <!-- 坐标轴箭头 -->
  <!-- Y轴箭头 -->
  <path d="M 100 530 L 100 95 L 95 105 M 100 95 L 105 105" stroke="#333" stroke-width="2" fill="none" stroke-linecap="round"/>
  <!-- X轴箭头 -->
  <path d="M 105 530 L 695 530 L 685 525 M 695 530 L 685 535" stroke="#333" stroke-width="2" fill="none" stroke-linecap="round"/>

  <!-- 分隔线 -->
  <line x1="400" y1="100" x2="400" y2="520" stroke="#888" stroke-width="1" stroke-dasharray="5,5"/>
  <line x1="110" y1="310" x2="690" y2="310" stroke="#888" stroke-width="1" stroke-dasharray="5,5"/>

  <!-- 左下象限 - 提示词工程 (黄色) -->
  <g transform="translate(110, 310)">
    <rect x="5" y="5" width="280" height="200" fill="#fffbe6" stroke="#e6b800" stroke-width="3" rx="8"/>
    <rect x="10" y="10" width="280" height="200" fill="#fffbe6" stroke="#d4a800" stroke-width="2" rx="6" stroke-dasharray="8,3"/>
    <text x="145" y="90" font-family="Comic Sans MS, cursive, sans-serif" font-size="16" fill="#b38f00" text-anchor="middle" font-weight="bold">提示词工程</text>
    <text x="145" y="115" font-family="Comic Sans MS, cursive, sans-serif" font-size="14" fill="#b38f00" text-anchor="middle">(Prompt Engineering)</text>
    <text x="145" y="155" font-family="Comic Sans MS, cursive, sans-serif" font-size="11" fill="#8c7300" text-anchor="middle">低上下文 + 低模型优化</text>
  </g>

  <!-- 左上象限 - 检索增强生成 (蓝色) -->
  <g transform="translate(110, 90)">
    <rect x="5" y="5" width="280" height="200" fill="#e6f3ff" stroke="#0066cc" stroke-width="3" rx="8"/>
    <rect x="10" y="10" width="280" height="200" fill="#e6f3ff" stroke="#0055aa" stroke-width="2" rx="6" stroke-dasharray="8,3"/>
    <text x="145" y="90" font-family="Comic Sans MS, cursive, sans-serif" font-size="16" fill="#0055aa" text-anchor="middle" font-weight="bold">检索增强生成</text>
    <text x="145" y="115" font-family="Comic Sans MS, cursive, sans-serif" font-size="12" fill="#004488" text-anchor="middle">(RAG)</text>
    <text x="145" y="155" font-family="Comic Sans MS, cursive, sans-serif" font-size="11" fill="#003366" text-anchor="middle">高上下文 + 低模型优化</text>
  </g>

  <!-- 右下象限 - 微调 (红色) -->
  <g transform="translate(410, 310)">
    <rect x="5" y="5" width="280" height="200" fill="#ffe6e6" stroke="#cc3333" stroke-width="3" rx="8"/>
    <rect x="10" y="10" width="280" height="200" fill="#ffe6e6" stroke="#aa2222" stroke-width="2" rx="6" stroke-dasharray="8,3"/>
    <text x="145" y="90" font-family="Comic Sans MS, cursive, sans-serif" font-size="16" fill="#aa2222" text-anchor="middle" font-weight="bold">微调</text>
    <text x="145" y="115" font-family="Comic Sans MS, cursive, sans-serif" font-size="14" fill="#aa2222" text-anchor="middle">(Fine-tuning)</text>
    <text x="145" y="155" font-family="Comic Sans MS, cursive, sans-serif" font-size="11" fill="#881111" text-anchor="middle">低上下文 + 高模型优化</text>
  </g>

  <!-- 右上象限 - 混合模式 (紫色) -->
  <g transform="translate(410, 90)">
    <rect x="5" y="5" width="280" height="200" fill="#f3e6ff" stroke="#9933cc" stroke-width="3" rx="8"/>
    <rect x="10" y="10" width="280" height="200" fill="#f3e6ff" stroke="#7722aa" stroke-width="2" rx="6" stroke-dasharray="8,3"/>
    <text x="145" y="85" font-family="Comic Sans MS, cursive, sans-serif" font-size="16" fill="#7722aa" text-anchor="middle" font-weight="bold">混合模式</text>
    <text x="145" y="110" font-family="Comic Sans MS, cursive, sans-serif" font-size="12" fill="#7722aa" text-anchor="middle" font-weight="bold">(RAG + 微调)</text>
    <text x="145" y="155" font-family="Comic Sans MS, cursive, sans-serif" font-size="11" fill="#551188" text-anchor="middle">高上下文 + 高模型优化</text>
  </g>

  <!-- 底部标注 -->
  <g transform="translate(620, 545)">
    <!-- 鲸鱼图标 -->
    <text x="0" y="30" font-family="Comic Sans MS, cursive, sans-serif" font-size="10" fill="#0066cc">https://github.com/tyronczt/ai-learn</text>
  </g>
</svg>
