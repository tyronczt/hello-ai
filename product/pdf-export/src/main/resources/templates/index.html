<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF模板导出系统</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <style>
        body { background-color: #f5f7fa; }
        .navbar-brand { font-weight: 600; }
        .card { border: none; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); }
        .table { background: white; border-radius: 8px; overflow: hidden; }
        .table thead { background: #f8f9fa; }
        .btn-primary { background: #0d6efd; border: none; border-radius: 8px; padding: 10px 24px; }
        .btn-primary:hover { background: #0b5ed7; }
        .btn-outline-primary { border-radius: 8px; }
        .badge-uploaded { background: #6c757d; }
        .badge-converting { background: #0dcaf0; }
        .badge-converted { background: #198754; }
        .badge-error { background: #dc3545; }
        .upload-zone { border: 2px dashed #dee2e6; border-radius: 12px; padding: 40px; text-align: center; cursor: pointer; transition: all 0.3s; }
        .upload-zone:hover { border-color: #0d6efd; background: #f8f9ff; }
        .upload-zone.dragover { border-color: #0d6efd; background: #e7f1ff; }
        .empty-state { padding: 60px; text-align: center; color: #6c757d; }
    </style>
</head>
<body>
    <!-- 导航栏 -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand" href="/">
                <i class="fas fa-file-pdf me-2"></i>PDF模板导出系统
            </a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link" href="/records">
                    <i class="fas fa-history me-1"></i>导出记录
                </a>
            </div>
        </div>
    </nav>

    <!-- 主内容 -->
    <div class="container mt-4">
        <!-- 上传区域 -->
        <div class="card mb-4">
            <div class="card-body">
                <h5 class="card-title mb-3">
                    <i class="fas fa-upload me-2 text-primary"></i>上传PDF模板
                </h5>
                <form id="uploadForm" enctype="multipart/form-data">
                    <div class="upload-zone" id="uploadZone">
                        <i class="fas fa-cloud-upload-alt fa-3x text-muted mb-3"></i>
                        <p class="mb-1 text-muted">点击或拖拽PDF文件到此处上传</p>
                        <p class="text-muted small">支持 PDF 文件，最大 50MB</p>
                        <input type="file" id="fileInput" name="file" accept=".pdf" style="display: none;">
                    </div>
                    <div class="row mt-3">
                        <div class="col-md-4">
                            <input type="text" class="form-control" name="name" placeholder="模板名称（可选）">
                        </div>
                        <div class="col-md-6">
                            <input type="text" class="form-control" name="description" placeholder="模板描述（可选）">
                        </div>
                        <div class="col-md-2">
                            <button type="submit" class="btn btn-primary w-100">
                                <i class="fas fa-upload me-1"></i>上传
                            </button>
                        </div>
                    </div>
                </form>
                <div id="uploadProgress" class="mt-3" style="display: none;">
                    <div class="progress">
                        <div class="progress-bar progress-bar-striped progress-bar-animated" style="width: 100%"></div>
                    </div>
                    <p class="text-muted small mt-2 mb-0">上传中...</p>
                </div>
            </div>
        </div>

        <!-- 模板列表 -->
        <div class="card">
            <div class="card-body">
                <h5 class="card-title mb-3">
                    <i class="fas fa-list me-2 text-primary"></i>模板列表
                </h5>
                
                <div th:if="${#lists.isEmpty(page.records)}" class="empty-state">
                    <i class="fas fa-inbox fa-4x mb-3"></i>
                    <h5>暂无模板</h5>
                    <p>请上传第一个PDF模板开始使用</p>
                </div>
                
                <table th:if="${not #lists.isEmpty(page.records)}" class="table table-hover mb-0">
                    <thead>
                        <tr>
                            <th>模板名称</th>
                            <th>描述</th>
                            <th>状态</th>
                            <th>上传时间</th>
                            <th width="200">操作</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="template : ${page.records}">
                            <td>
                                <a th:href="@{/template/{id}(id=${template.id})}" class="text-decoration-none">
                                    <i class="fas fa-file-pdf text-danger me-1"></i>
                                    <span th:text="${template.name}"></span>
                                </a>
                            </td>
                            <td th:text="${template.description ?: '-'}"></td>
                            <td>
                                <span th:class="${'badge badge-' + template.status.toLowerCase()}" 
                                      th:text="${#strings.replace(template.status, '_', ' ')}"></span>
                            </td>
                            <td th:text="${#temporals.format(template.createTime, 'yyyy-MM-dd HH:mm')}"></td>
                            <td>
                                <a th:href="@{/template/{id}(id=${template.id})}" class="btn btn-sm btn-outline-primary">
                                    <i class="fas fa-eye"></i>
                                </a>
                                <a th:if="${template.status == 'CONVERTED'}" 
                                   th:href="@{/export/{id}(id=${template.id})}" 
                                   class="btn btn-sm btn-success">
                                    <i class="fas fa-download"></i>
                                </a>
                                <button class="btn btn-sm btn-outline-danger" 
                                        onclick="deleteTemplate(this)" 
                                        th:data-id="${template.id}">
                                    <i class="fas fa-trash"></i>
                                </button>
                            </td>
                        </tr>
                    </tbody>
                </table>
                
                <!-- 分页 -->
                <nav th:if="${page.pages > 1}" class="mt-4">
                    <ul class="pagination justify-content-center">
                        <li class="page-item" th:classappend="${page.current == 1} ? 'disabled'">
                            <a class="page-link" th:href="@{/(pageNum=${page.current - 1})}">上一页</a>
                        </li>
                        <li class="page-item" th:each="i : ${#numbers.sequence(1, page.pages)}" 
                            th:classappend="${page.current == i} ? 'active'">
                            <a class="page-link" th:href="@{/(pageNum=${i})}" th:text="${i}"></a>
                        </li>
                        <li class="page-item" th:classappend="${page.current == page.pages} ? 'disabled'">
                            <a class="page-link" th:href="@{/(pageNum=${page.current + 1})}">下一页</a>
                        </li>
                    </ul>
                </nav>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const uploadZone = document.getElementById('uploadZone');
        const fileInput = document.getElementById('fileInput');
        const uploadForm = document.getElementById('uploadForm');
        const uploadProgress = document.getElementById('uploadProgress');

        // 点击上传区域
        uploadZone.addEventListener('click', () => fileInput.click());

        // 拖拽上传
        uploadZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadZone.classList.add('dragover');
        });
        uploadZone.addEventListener('dragleave', () => {
            uploadZone.classList.remove('dragover');
        });
        uploadZone.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadZone.classList.remove('dragover');
            if (e.dataTransfer.files.length) {
                fileInput.files = e.dataTransfer.files;
                uploadForm.dispatchEvent(new Event('submit'));
            }
        });

        // 文件选择后自动提交
        fileInput.addEventListener('change', () => {
            if (fileInput.files.length) {
                uploadForm.dispatchEvent(new Event('submit'));
            }
        });

        // 上传表单提交
        uploadForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const formData = new FormData(uploadForm);
            if (!formData.get('file')) {
                alert('请选择PDF文件');
                return;
            }
            
            uploadProgress.style.display = 'block';
            
            try {
                const response = await fetch('/api/template/upload', {
                    method: 'POST',
                    body: formData
                });
                const result = await response.json();
                
                if (result.success) {
                    alert('上传成功！');
                    location.reload();
                } else {
                    alert('上传失败: ' + result.message);
                }
            } catch (error) {
                alert('上传失败: ' + error.message);
            } finally {
                uploadProgress.style.display = 'none';
            }
        });

        // 删除模板
        async function deleteTemplate(btn) {
            const id = btn.dataset.id;
            if (!confirm('确定要删除这个模板吗？')) return;
            
            try {
                const response = await fetch(`/api/template/${id}`, { method: 'DELETE' });
                const result = await response.json();
                
                if (result.success) {
                    location.reload();
                } else {
                    alert('删除失败: ' + result.message);
                }
            } catch (error) {
                alert('删除失败: ' + error.message);
            }
        }
    </script>
</body>
</html>
