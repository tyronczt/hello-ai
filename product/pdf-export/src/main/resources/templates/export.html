<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${template.name} + ' - 数据导出'">数据导出</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <style>
        body { background-color: #f5f7fa; }
        .card { border: none; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); }
        .btn-success { background: #198754; border: none; border-radius: 8px; }
        .form-control { border-radius: 8px; }
        .placeholder-tag { background: #e7f1ff; color: #0d6efd; padding: 2px 8px; border-radius: 4px; font-size: 0.85em; }
        .record-item { background: #f8f9fa; border-radius: 8px; padding: 12px; margin-bottom: 8px; }
    </style>
</head>
<body>
    <!-- 导航栏 -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand" th:href="@{/template/{id}(id=${template.id})}">
                <i class="fas fa-arrow-left me-2"></i>返回详情
            </a>
            <span class="navbar-text text-white">
                <i class="fas fa-file-export me-1"></i>
                <span th:text="${template.name}"></span> - 数据导出
            </span>
        </div>
    </nav>

    <div class="container mt-4">
        <div class="row">
            <!-- 数据填写表单 -->
            <div class="col-md-8">
                <div class="card">
                    <div class="card-header">
                        <i class="fas fa-edit me-2"></i>填写导出数据
                    </div>
                    <div class="card-body">
                        <form id="exportForm">
                            <div id="formFields">
                                <div class="text-muted text-center py-5">
                                    <i class="fas fa-spinner fa-spin fa-2x"></i>
                                    <p class="mt-2">正在加载占位符...</p>
                                </div>
                            </div>
                            
                            <div class="mt-4">
                                <button type="submit" class="btn btn-success btn-lg">
                                    <i class="fas fa-file-pdf me-2"></i>生成PDF
                                </button>
                            </div>
                        </form>
                        
                        <div id="exportProgress" class="mt-3" style="display: none;">
                            <div class="progress">
                                <div class="progress-bar progress-bar-striped progress-bar-animated" style="width: 100%"></div>
                            </div>
                            <p class="text-muted small mt-2 mb-0">正在生成PDF...</p>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 导出记录 -->
            <div class="col-md-4">
                <div class="card">
                    <div class="card-header">
                        <i class="fas fa-history me-2"></i>最近导出记录
                    </div>
                    <div class="card-body">
                        <div th:if="${#lists.isEmpty(records)}" class="text-muted text-center py-3">
                            暂无导出记录
                        </div>
                        <div th:each="record : ${records}" class="record-item">
                            <div class="d-flex justify-content-between align-items-center">
                                <div>
                                    <small class="text-muted" th:text="${#temporals.format(record.createTime, 'yyyy-MM-dd HH:mm')}"></small>
                                    <div class="small">
                                        <span class="placeholder-tag" th:each="key : ${T(com.alibaba.fastjson2.JSON).parseObject(record.dataJson).keySet()}" 
                                              th:text="${'${' + key + '}'}" style="margin-right: 4px;"></span>
                                    </div>
                                </div>
                                <a th:href="@{/api/template/record/{id}/download(id=${record.id})}" 
                                   class="btn btn-sm btn-outline-primary">
                                    <i class="fas fa-download"></i>
                                </a>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script th:inline="javascript">
        const templateId = [[${template.id}]];
        const placeholders = [];
        
        // 加载占位符
        async function loadPlaceholders() {
            try {
                const response = await fetch(`/api/template/${templateId}/placeholders`);
                const result = await response.json();
                
                if (result.success && result.data.length > 0) {
                    renderForm(result.data);
                } else {
                    document.getElementById('formFields').innerHTML = 
                        '<div class="alert alert-warning"><i class="fas fa-exclamation-triangle me-2"></i>未找到占位符，请检查.fo模板</div>';
                }
            } catch (error) {
                document.getElementById('formFields').innerHTML = 
                    '<div class="alert alert-danger"><i class="fas fa-times-circle me-2"></i>加载占位符失败</div>';
            }
        }
        
        // 渲染表单
        function renderForm(placeholders) {
            const container = document.getElementById('formFields');
            let html = '<div class="row">';
            
            placeholders.forEach((p, index) => {
                const label = formatPlaceholder(p);
                html += `
                    <div class="col-md-6 mb-3">
                        <label class="form-label">
                            <i class="fas fa-tag me-1 text-primary"></i>
                            ${label}
                            <span class="placeholder-tag ms-1">\${${p}}</span>
                        </label>
                        <input type="text" class="form-control" name="${p}" 
                               placeholder="请输入${label}" required>
                    </div>
                `;
            });
            
            html += '</div>';
            container.innerHTML = html;
        }
        
        // 格式化占位符为可读标签
        function formatPlaceholder(name) {
            return name
                .replace(/([A-Z])/g, ' $1')
                .replace(/^./, str => str.toUpperCase())
                .replace(/_/g, ' ')
                .trim();
        }
        
        // 导出表单提交
        document.getElementById('exportForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const formData = new FormData(e.target);
            const data = {};
            let hasValue = false;
            
            formData.forEach((value, key) => {
                data[key] = value;
                if (value.trim()) hasValue = true;
            });
            
            if (!hasValue) {
                alert('请至少填写一个字段');
                return;
            }
            
            const progress = document.getElementById('exportProgress');
            progress.style.display = 'block';
            
            try {
                const response = await fetch(`/api/template/${templateId}/export`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ formData: data })
                });
                
                if (response.ok) {
                    const blob = await response.blob();
                    const url = window.URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = [[${template.name}]] + '.pdf';
                    document.body.appendChild(a);
                    a.click();
                    window.URL.revokeObjectURL(url);
                    a.remove();
                    
                    alert('PDF导出成功！');
                    location.reload();
                } else {
                    throw new Error('导出失败');
                }
            } catch (error) {
                alert('导出失败: ' + error.message);
            } finally {
                progress.style.display = 'none';
            }
        });
        
        // 页面加载时获取占位符
        loadPlaceholders();
    </script>
</body>
</html>
