<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${template.name} + ' - 模板详情'">模板详情</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <style>
        body { background-color: #f5f7fa; }
        .card { border: none; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); }
        .btn-primary { background: #0d6efd; border: none; border-radius: 8px; }
        .btn-success { border-radius: 8px; }
        .badge-uploaded { background: #6c757d; }
        .badge-converting { background: #0dcaf0; }
        .badge-converted { background: #198754; }
        .badge-error { background: #dc3545; }
        .status-indicator { display: inline-block; width: 10px; height: 10px; border-radius: 50%; margin-right: 8px; }
        .status-converting { background: #0dcaf0; animation: pulse 1.5s infinite; }
        .status-converted { background: #198754; }
        .status-error { background: #dc3545; }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        .code-editor { font-family: 'Consolas', 'Monaco', monospace; font-size: 14px; line-height: 1.5; }
        .pdf-preview { background: #f8f9fa; border-radius: 8px; min-height: 400px; display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body>
    <!-- 导航栏 -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand" href="/">
                <i class="fas fa-arrow-left me-2"></i>返回列表
            </a>
            <span class="navbar-text text-white">
                <i class="fas fa-file-pdf me-1"></i>
                <span th:text="${template.name}"></span>
            </span>
        </div>
    </nav>

    <div class="container mt-4">
        <!-- 状态提示 -->
        <div class="alert alert-info" th:if="${template.status == 'UPLOADED'}">
            <i class="fas fa-info-circle me-2"></i>
            模板已上传，请点击"AI转换为FO"按钮开始转换
        </div>
        <div class="alert alert-success" th:if="${template.status == 'CONVERTED'}">
            <i class="fas fa-check-circle me-2"></i>
            模板转换成功，可以编辑.fo内容或进入导出页面
        </div>
        <div class="alert alert-danger" th:if="${template.status == 'ERROR'}">
            <i class="fas fa-exclamation-circle me-2"></i>
            转换失败: <span th:text="${template.errorMsg}"></span>
        </div>
        <div class="alert alert-info" th:if="${template.status == 'CONVERTING'}">
            <i class="fas fa-spinner fa-spin me-2"></i>
            AI正在转换中，请稍候...
        </div>

        <div class="row">
            <!-- PDF预览 -->
            <div class="col-md-5">
                <div class="card">
                    <div class="card-header">
                        <i class="fas fa-file-pdf me-2"></i>原始PDF
                    </div>
                    <div class="card-body">
                        <div class="pdf-preview">
                            <div th:if="${pdfUrl}">
                                <iframe th:src="${pdfUrl}" width="100%" height="500" style="border: none;"></iframe>
                            </div>
                            <div th:unless="${pdfUrl}" class="text-muted">
                                <i class="fas fa-file-pdf fa-5x mb-3"></i>
                                <p>PDF预览不可用</p>
                                <a th:href="${pdfUrl}" class="btn btn-sm btn-outline-primary" target="_blank">
                                    <i class="fas fa-external-link-alt me-1"></i>在新窗口打开
                                </a>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- FO模板编辑 -->
            <div class="col-md-7">
                <div class="card">
                    <div class="card-header d-flex justify-content-between align-items-center">
                        <span><i class="fas fa-code me-2"></i>.fo模板内容</span>
                        <span class="badge" th:classappend="${'badge-' + template.status.toLowerCase()}" 
                              th:text="${template.status}"></span>
                    </div>
                    <div class="card-body">
                        <form id="foForm">
                            <textarea id="foContent" name="foContent" class="form-control code-editor" rows="20" 
                                      th:text="${template.foContent ?: ''}"
                                      placeholder=".fo模板内容将在转换后显示..."></textarea>
                        </form>
                        
                        <div class="mt-3 d-flex gap-2">
                            <button type="button" class="btn btn-primary" id="convertBtn" 
                                    th:disabled="${template.status == 'CONVERTING'}"
                                    onclick="convertTemplate()">
                                <i class="fas fa-magic me-1"></i>AI 转换为 FO
                            </button>
                            <button type="button" class="btn btn-success" id="saveBtn" 
                                    th:disabled="${template.foContent == null}"
                                    onclick="saveFo()">
                                <i class="fas fa-save me-1"></i>保存模板
                            </button>
                            <a th:if="${template.status == 'CONVERTED'}" 
                               th:href="@{/template/{id}/preview(id=${template.id})}" 
                               class="btn btn-info ms-auto">
                                <i class="fas fa-eye me-1"></i>FO 预览
                            </a>
                            <a th:if="${template.status == 'CONVERTED'}" 
                               th:href="@{/export/{id}(id=${template.id})}" 
                               class="btn btn-success">
                                <i class="fas fa-file-export me-1"></i>进入导出
                            </a>
                        </div>
                        
                        <div id="convertProgress" class="mt-3" style="display: none;">
                            <div class="spinner-border text-primary" role="status">
                                <span class="visually-hidden">Loading...</span>
                            </div>
                            <span class="ms-2">正在调用AI转换，请稍候...</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script th:inline="javascript">
        const templateId = [[${template.id}]];
        
        async function convertTemplate() {
            if (!confirm('确定要使用AI转换PDF为.fo模板吗？\n注意：此操作需要访问外部AI服务，可能需要一定时间。')) return;
            
            const convertBtn = document.getElementById('convertBtn');
            const progress = document.getElementById('convertProgress');
            
            convertBtn.disabled = true;
            progress.style.display = 'block';
            
            try {
                const response = await fetch(`/api/template/${templateId}/convert`, {
                    method: 'POST'
                });
                const result = await response.json();
                
                if (result.success) {
                    document.getElementById('foContent').value = result.data.foContent;
                    alert('转换成功！');
                    location.reload();
                } else {
                    alert('转换失败: ' + result.message);
                    location.reload();
                }
            } catch (error) {
                alert('转换失败: ' + error.message);
                location.reload();
            }
        }
        
        async function saveFo() {
            const foContent = document.getElementById('foContent').value;
            
            try {
                const response = await fetch(`/api/template/${templateId}/fo`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ foContent })
                });
                const result = await response.json();
                
                if (result.success) {
                    alert('保存成功！');
                } else {
                    alert('保存失败: ' + result.message);
                }
            } catch (error) {
                alert('保存失败: ' + error.message);
            }
        }
    </script>
</body>
</html>
