<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>导出记录</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <style>
        body { background-color: #f5f7fa; }
        .card { border: none; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); }
    </style>
</head>
<body>
    <!-- 导航栏 -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand" href="/">
                <i class="fas fa-arrow-left me-2"></i>返回首页
            </a>
            <span class="navbar-text text-white">
                <i class="fas fa-history me-1"></i>导出记录
            </span>
        </div>
    </nav>

    <div class="container mt-4">
        <div class="card">
            <div class="card-body">
                <table class="table table-hover mb-0">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>模板名称</th>
                            <th>填充数据</th>
                            <th>导出时间</th>
                            <th>操作</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="record : ${page.records}">
                            <td th:text="${record.id}"></td>
                            <td>
                                <a th:href="@{/export/{id}(id=${record.templateId})}" class="text-decoration-none">
                                    <span th:text="${record.templateName ?: '未知模板'}"></span>
                                </a>
                            </td>
                            <td>
                                <span class="badge bg-secondary" 
                                      th:each="key : ${T(com.alibaba.fastjson2.JSON).parseObject(record.dataJson).keySet()}"
                                      th:text="${'${' + key + '}'}" style="margin-right: 4px;"></span>
                            </td>
                            <td th:text="${#temporals.format(record.createTime, 'yyyy-MM-dd HH:mm:ss')}"></td>
                            <td>
                                <a th:href="@{/api/template/record/{id}/download(id=${record.id})}" 
                                   class="btn btn-sm btn-primary">
                                    <i class="fas fa-download me-1"></i>下载
                                </a>
                            </td>
                        </tr>
                    </tbody>
                </table>
                
                <div th:if="${#lists.isEmpty(page.records)}" class="text-center py-5 text-muted">
                    <i class="fas fa-inbox fa-4x mb-3"></i>
                    <h5>暂无导出记录</h5>
                </div>
                
                <!-- 分页 -->
                <nav th:if="${page.pages > 1}" class="mt-4">
                    <ul class="pagination justify-content-center">
                        <li class="page-item" th:classappend="${page.current == 1} ? 'disabled'">
                            <a class="page-link" th:href="@{/records(pageNum=${page.current - 1})}">上一页</a>
                        </li>
                        <li class="page-item" th:each="i : ${#numbers.sequence(1, page.pages)}" 
                            th:classappend="${page.current == i} ? 'active'">
                            <a class="page-link" th:href="@{/records(pageNum=${i})}" th:text="${i}"></a>
                        </li>
                        <li class="page-item" th:classappend="${page.current == page.pages} ? 'disabled'">
                            <a class="page-link" th:href="@{/records(pageNum=${page.current + 1})}">下一页</a>
                        </li>
                    </ul>
                </nav>
            </div>
        </div>
    </div>
</body>
</html>
